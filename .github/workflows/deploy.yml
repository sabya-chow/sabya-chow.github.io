# .github/workflows/deploy.yml
# Drop this file at: .github/workflows/deploy.yml in your repo root
# GitHub Pages will auto-deploy every time you push to main.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # uploads entire repo root as the site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
